name: "claude-flag-launch"
brief: "为 Anthropic 的 Claude 制作一张中文社媒宣发图，表达 Claude 是帮助用户处理复杂问题的思考伙伴。画面核心是旗帜意象；这是非官方 campaign concept，不要伪装成官方公告。"
