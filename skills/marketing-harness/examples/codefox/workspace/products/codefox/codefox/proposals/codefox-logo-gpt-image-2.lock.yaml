version: 1.4.0
brand:
  id: codefox
  name: CodeFox
provider:
  gateway: gpt-image-skill
  model: gpt-image-2
  params:
    seed_strategy: fixed
    seed: 12345
    quality: medium
    timeout_seconds: 120
    retry_attempts: 3
    output_format: png
global:
  color:
    brand-primary:
      $value: '#F58220'
      $type: color
    brand-accent:
      $value: '#0E2B3A'
      $type: color
    bg-neutral:
      $value: '#FFF3E0'
      $type: color
  typography:
    primary-face:
      $value: clean geometric sans serif, high legibility
      $type: fontFamily
  style-fragment:
    base-aesthetic:
      $value: '# CodeFox Logo-Led Campaign Brief CodeFox logo-led campaign visual
        system. Palette: fox orange, dark teal outline, warm cream, verification mint,
        ink. Use the uploaded template at `workspace/products/codefox/codefox/references/codefox-logo-template.png`:
        a seated orange fox mascot with closed eye, cream tail tip, consistent brand
        system, production-ready marketing visual language, disciplined composition'
      $type: text
    mood-clean:
      $value: clean, controlled, legible, spacious, precise, no visual clutter
      $type: text
  negative:
    global-exclude:
      $value: low quality, blurry, distorted text, malformed logo, watermark, crowded
        layout, off-brand colors
      $type: text
  reference:
    main-visual:
      $value: workspace/products/codefox/codefox/references/codefox-logo-template.png
      $type: asset
alias:
  style:
    launch-hero:
      $type: composite
      $value:
        prompt: '{global.style-fragment.base-aesthetic}, {global.style-fragment.mood-clean}'
        palette:
        - '{global.color.brand-primary}'
        - '{global.color.brand-accent}'
        typography: '{global.typography.primary-face}'
        negative: '{global.negative.global-exclude}'
        references:
        - '{global.reference.main-visual}'
    social-default:
      $type: composite
      $value:
        prompt: '{global.style-fragment.base-aesthetic}'
        palette:
        - '{global.color.brand-primary}'
        - '{global.color.bg-neutral}'
        typography: '{global.typography.primary-face}'
        negative: '{global.negative.global-exclude}'
        references:
        - '{global.reference.main-visual}'
