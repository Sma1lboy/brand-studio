schema_version: "1.0"
kind: producer_recommendations

# Pure reference catalog of external producer / reference skills, grouped by
# capability. brand-studio references these by name; it does NOT auto-download,
# clone, install, or vendor them as callable skills. The user installs/binds
# what they want (or brand-studio bundles read-only instruction-grade producers
# under producers/). See CLAUDE.md for the boundary.
#
# Star counts and "active" flags verified via the GitHub API on 2026-06-29;
# they drift over time — treat as a maturity hint, not a contract.
#
# lane:
#   generator  = produces an asset (image / video / slide / logo / social / copy)
#   reference  = borrow UI convention / taste / color+typography only (NOT a generator)
# format:
#   skill        = real installable SKILL.md agent skill
#   skill-pack   = repo bundling several SKILL.md skills
#   skill-plugin = SKILL.md packaged as a plugin
#   list         = curated index / awesome-list (reference material)
# best: true     = current best pick for that capability

capabilities:
  image:
    lane: generator
    recommended:
      - name: smixs/visual-skills
