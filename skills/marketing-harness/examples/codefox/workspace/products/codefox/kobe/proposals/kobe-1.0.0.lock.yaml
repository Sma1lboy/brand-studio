version: "1.0.0"

portfolio:
  id: "codefox"
  name: "CodeFox"
  version: "1.0.0"

brand:
  id: "kobe"
  name: "kobe"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "fixed"
    seed: 24017
    quality: "medium"
    timeout_seconds: 180
    retry_attempts: 3
    output_format: "png"

global:
  color:
    terminal-black: { $value: "#10110F", $type: "color" }
    graphite: { $value: "#1A1C1A", $type: "color" }
    phosphor-cyan: { $value: "#4DF5FF", $type: "color" }
    agent-green: { $value: "#8CFF6A", $type: "color" }
    muted-gray: { $value: "#A6A6A0", $type: "color" }
  typography:
    terminal-face: { $value: "condensed monospaced terminal typography, precise uppercase tracking, sharp readable UI labels", $type: "fontFamily" }
  style-fragment:
    base-aesthetic:
      $value: "high-tech terminal-native promotional visual, SSH-friendly TUI atmosphere, dark graphite canvas, crisp tmux panes, parallel AI coding agents represented as isolated git worktree lanes, cinematic but restrained, no browser chrome"
      $type: "text"
    product-signature:
      $value: "minimal black hero inspired by the reference image, centered monospace type, subtle glowing pane borders, cyan and green circuit-like branch traces, five parallel agent sessions visible without clutter"
      $type: "text"
  negative:
    global-exclude:
      $value: "cartoon mascot, glossy SaaS dashboard, browser window mockup, fake unreadable paragraphs, malformed terminal text, low contrast, cluttered layout, stock-photo people, watermark"
      $type: "text"
  reference:
    tui-reference: { $value: "workspace/products/codefox/kobe/references/kobe-tui-reference.png", $type: "asset" }

alias:
  style:
    launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.base-aesthetic}, {global.style-fragment.product-signature}"
        palette: ["{global.color.terminal-black}", "{global.color.graphite}", "{global.color.phosphor-cyan}", "{global.color.agent-green}", "{global.color.muted-gray}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-reference}"]
    social-default:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.base-aesthetic}"
        palette: ["{global.color.terminal-black}", "{global.color.phosphor-cyan}", "{global.color.agent-green}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-reference}"]
