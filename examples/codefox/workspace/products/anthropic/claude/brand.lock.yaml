version: "1.0.0"

portfolio:
  id: "anthropic"
  name: "Anthropic"
  version: "1.0.0"

brand:
  id: "claude"
  name: "Claude"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "per_asset"
    seed: 20260618
    quality: "medium"
    timeout_seconds: 180
    retry_attempts: 2
    output_format: "png"
    background: "opaque"
    moderation: "auto"

global:
  color:
    ink: { $value: "#191713", $type: "color" }
    paper: { $value: "#F7F1E8", $type: "color" }
    clay: { $value: "#D87857", $type: "color" }
    shell: { $value: "#EBBBAC", $type: "color" }
    graphite: { $value: "#3A342D", $type: "color" }
    signal-blue: { $value: "#2F6F9F", $type: "color" }
  typography:
    display-face:
      $value: "large crisp humanist serif or warm grotesk title typography with restrained tracking"
      $type: "fontFamily"
    utility-face:
      $value: "clean neutral sans serif for small labels, precise and highly legible"
      $type: "fontFamily"
  style-fragment:
    flag-editorial:
      $value: "premium public-benefit AI campaign poster, one modern woven fabric flag as the hero object, clear editorial hierarchy, tactile paper and desk-light realism, quiet confidence, spacious composition"
      $type: "text"
    thinking-space:
      $value: "visual cues of serious thinking: paper margins, soft gridlines, pencil notes, simple reasoning diagrams, controlled negative space, no generic glowing AI sphere"
      $type: "text"
  negative:
    global-exclude:
      $value: "garbled text, unreadable typography, malformed Claude word, fake official seals, fake sponsor logos, watermark, cheap e-commerce flyer, cluttered interface, glossy robot mascot, crowded composition"
      $type: "text"

alias:
  style:
    flag-launch:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.flag-editorial}, {global.style-fragment.thinking-space}"
        palette:
          - "{global.color.ink}"
          - "{global.color.paper}"
          - "{global.color.clay}"
          - "{global.color.shell}"
          - "{global.color.graphite}"
          - "{global.color.signal-blue}"
        typography: "{global.typography.display-face}; {global.typography.utility-face}"
        negative: "{global.negative.global-exclude}"
        references: []
