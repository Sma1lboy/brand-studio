version: "1.1.0"

portfolio:
  id: "codefox"
  name: "CodeFox"
  version: "1.0.0"

brand:
  id: "codefox"
  name: "CodeFox"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "fixed"
    seed: 12345
    quality: "medium"
    timeout_seconds: 120
    retry_attempts: 3
    output_format: "png"

global:
  color:
    brand-primary: { $value: "#1A1A2E", $type: "color" }
    brand-accent: { $value: "#E94560", $type: "color" }
    bg-neutral: { $value: "#F5F5F0", $type: "color" }
  typography:
    primary-face: { $value: "clean geometric sans serif, high legibility", $type: "fontFamily" }
  style-fragment:
    base-aesthetic:
      $value: "premium editorial product visual, crisp geometry, controlled contrast, refined lighting, balanced negative space"
      $type: "text"
    mood-clean:
      $value: "clean minimal composition, precise edges, quiet confidence, no clutter"
      $type: "text"
  negative:
    global-exclude:
      $value: "low quality, blurry, distorted text, malformed logo, watermark, crowded layout, off-brand colors"
      $type: "text"
  reference:
    main-visual: { $value: "workspace/products/codefox/codefox/references/main_visual.png", $type: "asset" }

alias:
  style:
    launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.base-aesthetic}, {global.style-fragment.mood-clean}"
        palette: ["{global.color.brand-primary}", "{global.color.brand-accent}"]
        typography: "{global.typography.primary-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.main-visual}"]
    social-default:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.base-aesthetic}"
        palette: ["{global.color.brand-primary}", "{global.color.bg-neutral}"]
        typography: "{global.typography.primary-face}"
        negative: "{global.negative.global-exclude}"
        references: []
