name: Release

on:
  workflow_dispatch:
    inputs:
      campaign_path:
        description: "Campaign YAML to render before publishing."
        required: true
        type: string
        default: examples/codefox/workspace/products/codefox/codefox/campaigns/example.campaign.yaml
      brand_path:
        description: "brand.lock.yaml to use for validation and render."
        required: true
        type: string
        default: examples/codefox/workspace/products/codefox/codefox/brand.lock.yaml
      campaign_name:
        description: "Campaign name used by harness publish."
        required: true
        type: string
        default: feature-x-launch
      channel:
        description: "Publish channel."
        required: true
        type: choice
        default: release
        options:
          - release
          - cdn
          - repo
      live_render:
        description: "Call the image provider instead of rendering dry-run placeholders."
        required: true
        type: boolean
        default: false
      publish:
        description: "Pass --publish to harness publish."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Render and publish artifacts
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      HARNESS_SKILL_CLI_COMMAND: ${{ vars.HARNESS_SKILL_CLI_COMMAND }}
      HARNESS_CDN_BUCKET: ${{ secrets.HARNESS_CDN_BUCKET }}
      HARNESS_CDN_ENDPOINT: ${{ secrets.HARNESS_CDN_ENDPOINT }}
      HARNESS_CDN_BASE_URL: ${{ secrets.HARNESS_CDN_BASE_URL }}
      HARNESS_CDN_PREFIX: ${{ vars.HARNESS_CDN_PREFIX }}
      HARNESS_CDN_ACCESS_KEY_ID: ${{ secrets.HARNESS_CDN_ACCESS_KEY_ID }}
      HARNESS_CDN_SECRET_ACCESS_KEY: ${{ secrets.HARNESS_CDN_SECRET_ACCESS_KEY }}
      HARNESS_CDN_REGION: ${{ vars.HARNESS_CDN_REGION }}
      HARNESS_REPO_PUBLISH_DIR: ${{ vars.HARNESS_REPO_PUBLISH_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Validate campaign
        run: uv run harness validate "${{ inputs.campaign_path }}" --brand "${{ inputs.brand_path }}"

      - name: Render without API calls
        if: ${{ !inputs.live_render }}
        run: uv run harness render "${{ inputs.campaign_path }}" --brand "${{ inputs.brand_path }}" --dry-run

      - name: Render with image provider
        if: ${{ inputs.live_render }}
        run: uv run harness render "${{ inputs.campaign_path }}" --brand "${{ inputs.brand_path }}"

      - name: Publish dry-run
        if: ${{ !inputs.publish }}
        run: >
          uv run harness publish "${{ inputs.campaign_name }}"
          --channel "${{ inputs.channel }}"

      - name: Publish
        if: ${{ inputs.publish }}
        run: >
          uv run harness publish "${{ inputs.campaign_name }}"
          --channel "${{ inputs.channel }}"
          --publish

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v4
        with:
          name: release-outputs-${{ github.run_id }}
          path: outputs/${{ inputs.campaign_name }}/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload release archive
        if: ${{ inputs.publish && inputs.channel == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-archive-${{ github.run_id }}
          path: releases/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload repo artifacts
        if: ${{ inputs.publish && inputs.channel == 'repo' }}
        uses: actions/upload-artifact@v4
        with:
          name: repo-artifacts-${{ github.run_id }}
          path: published/**
          if-no-files-found: error
          retention-days: 30
