version: 1.0.2
portfolio:
  id: anthropic
  name: Anthropic
  version: 1.0.0
brand:
  id: claude
  name: Claude
provider:
  gateway: gpt-image-skill
  model: gpt-image-2
  params:
    seed_strategy: per_asset
    seed: 20260620
    quality: high
    timeout_seconds: 240
    retry_attempts: 2
    output_format: png
    background: opaque
    moderation: auto
global:
  color:
    ink:
      $value: '#191713'
      $type: color
    paper:
      $value: '#F7F1E8'
      $type: color
    clay:
      $value: '#D87857'
      $type: color
    shell:
      $value: '#EBBBAC'
      $type: color
    graphite:
      $value: '#3A342D'
      $type: color
    signal-blue:
      $value: '#2F6F9F'
      $type: color
    space-black:
      $value: '#05070B'
      $type: color
    ceramic-white:
      $value: '#E7E2D8'
      $type: color
    lunar-silver:
      $value: '#A9B0B6'
      $type: color
    claude-clay:
      $value: '#D87857'
      $type: color
    engine-blue:
      $value: '#56B8FF'
      $type: color
    graphite-metal:
      $value: '#2A2D31'
      $type: color
  typography:
    display-face:
      $value: large crisp high-contrast Claude masthead with aerospace campaign restraint
      $type: fontFamily
    utility-face:
      $value: compact aerospace stencil sans or precise technical grotesk for short
        labels, bilingual text clear and sparse
      $type: fontFamily
  style-fragment:
    flag-editorial:
      $value: premium public-benefit AI campaign poster, one modern woven fabric flag
        as the hero object, clear editorial hierarchy, tactile paper and desk-light
        realism, quiet confidence, spacious composition
      $type: text
    thinking-space:
      $value: 'visual cues of serious thinking: paper margins, soft gridlines, pencil
        notes, simple reasoning diagrams, controlled negative space, no generic glowing
        AI sphere'
      $type: text
    hardware-frontier:
      $value: premium cinematic aerospace hardware campaign poster, physical technology
        drives the image, believable moon mission equipment, frontier-scale engineering,
        no decorative interface layer
      $type: text
    lunar-machinery:
      $value: 'dominant real objects: tall lunar landing rocket or ascent vehicle,
        compact lander with folded legs, thruster bells, rover, solar-panel wings,
        antenna mast, mechanical arm, instrument packages, cable umbilicals, truss
        structures, dust-covered brushed titanium, ceramic white shells, graphite
        thermal blankets, blue-white engine or sensor light'
      $type: text
  negative:
    global-exclude:
      $value: garbled text, unreadable typography, malformed Claude word, fake official
        seals, fake sponsor logos, watermark, cheap e-commerce flyer, cartoon astronaut,
        glossy robot mascot, generic glowing AI sphere, plastic UI panels, HUD overlays,
        floating dashboard widgets, holographic interface screens, cyberpunk neon
        city, cozy paper notebook, hand-drawn desk sketch, warm scrapbook editorial,
        crowded composition
      $type: text
alias:
  style:
    flag-launch:
      $type: composite
      $value:
        prompt: '{global.style-fragment.hardware-frontier}, {global.style-fragment.lunar-machinery}'
        palette:
        - '{global.color.space-black}'
        - '{global.color.ceramic-white}'
        - '{global.color.lunar-silver}'
        - '{global.color.claude-clay}'
        - '{global.color.engine-blue}'
        - '{global.color.graphite-metal}'
        typography: '{global.typography.display-face}; {global.typography.utility-face}'
        negative: '{global.negative.global-exclude}'
        references: []
