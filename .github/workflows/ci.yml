name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and dry-run render
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Validate example campaign
        working-directory: skills/brand-studio/examples/codefox
        run: uv run python ../../scripts/harness.py --metadata marketing.harness.yaml repo validate

      - name: Render example campaign without API calls
        working-directory: skills/brand-studio/examples/codefox
        run: uv run python ../../scripts/harness.py --metadata marketing.harness.yaml repo render --dry-run

      - name: Validate launcher smoke
        run: |
          uv run python skills/brand-studio/scripts/harness.py repo check
          cd skills/brand-studio/examples/codefox
          uv run python ../../scripts/harness.py --metadata marketing.harness.yaml repo validate

      - name: Check dry-run output contract
        run: |
          test -f skills/brand-studio/examples/codefox/packages/branding/.harness/out/feature-x-launch/manifest.json
          test -f skills/brand-studio/examples/codefox/packages/branding/.harness/out/feature-x-launch/run.lock.json
