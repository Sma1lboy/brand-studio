project:
  id: my-product
  root: .
  marketingRoot: assets/marketing

organization:
  id: my-org
  name: My Org

skillDistribution:
  upstream: sma1lboy/brand-studio
  fork: my-org/brand-studio
  scope: org
  ref: main

brandStandard:
  source: org-fork
  path: public/brand/brand-standard.md
  themeBase: public/brand/theme.base.md
  references: public/brand/references
  version: 1.0.0

theme:
  path: assets/marketing/theme.md
  references: assets/marketing/references

campaigns:
  release: assets/marketing/campaigns/release
  promo: assets/marketing/campaigns/promo

skills:
  # Bind each capability to a producer: a bundled producers/<id> or a locally
  # installed skill name. Empty = unbound (never silently routed to image).
  # See references/recommendations.yaml for suggested producers per capability.
  image: ""
  video: ""
  copy: ""
  slide: ""
  logo: ""
  social: ""

backends:
  # Execution engine per modality. The studio runtime only declares/threads this;
  # the producer subagent runs it. Credentials live in the runner's env, never
  # here. Leave empty to let the bound producer skill use its own engine.
  text-to-image:
    runner: ""        # e.g. codex-exec | api | mcp | custom
    command: ""       # e.g. "codex exec ..." (user-local CLI)
    model: ""         # e.g. gpt-image-2
  # text-to-video / text-to-slide / text-to-copy follow the same shape.

weightProfiles:
  # Producers resolve this profile from metadata and apply their fixed source
  # interpretation rules. producer-context.json carries only the profile name.
  default: promo-default
  promo-default:
    history: 30
    request: 30
    org: 10
    producer: 30
  release-default:
    history: 20
    request: 25
    copy: 35
    org: 10
    producer: 10
  logo-default:
    history: 20
    request: 20
    org: 30
    producer: 30

campaign:
  name: launch
  path: assets/marketing/campaigns/promo/launch.campaign.yaml

artifacts:
  scratch: .studio/marketing/out
  approved: public/marketing

state:
  plans: assets/marketing/plans
  assetIndex: assets/marketing/asset-state.yaml
  accepted: assets/marketing/accepted.yaml
  directoryStateFile: asset-state.yaml

portfolios:
  release:
    accepted: assets/marketing/portfolios/release/accepted.yaml
    assetState: assets/marketing/portfolios/release/asset-state.yaml
    patterns: assets/marketing/portfolios/release/patterns.md
  promo:
    accepted: assets/marketing/portfolios/promo/accepted.yaml
    assetState: assets/marketing/portfolios/promo/asset-state.yaml
    patterns: assets/marketing/portfolios/promo/patterns.md

sources:
  assetRoots:
    - assets/marketing
    - public/marketing
  relatedRepos: []

policy:
  requireHumanApprovalBeforeRender: true
  requireHumanApprovalBeforeStateUpdate: true
  allowRootWorkspaceBootstrap: false
