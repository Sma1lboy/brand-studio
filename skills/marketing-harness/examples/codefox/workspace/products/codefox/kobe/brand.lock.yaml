version: "1.2.0"

portfolio:
  id: "codefox"
  name: "CodeFox"
  version: "1.0.0"

brand:
  id: "kobe"
  name: "kobe"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "fixed"
    seed: 24019
    quality: "high"
    timeout_seconds: 180
    retry_attempts: 3
    output_format: "png"

global:
  color:
    ink-black: { $value: "#101820", $type: "color" }
    panel-navy: { $value: "#1A2632", $type: "color" }
    warm-cream: { $value: "#F7F1E5", $type: "color" }
    soft-cream: { $value: "#FFFCF5", $type: "color" }
    mint-green: { $value: "#2FE6A7", $type: "color" }
    amber: { $value: "#FFB000", $type: "color" }
    coral: { $value: "#E84A5F", $type: "color" }
    muted-slate: { $value: "#748490", $type: "color" }
  typography:
    terminal-face: { $value: "monospaced terminal UI typography, bold readable launch headline, precise pane labels, no fake paragraph blocks", $type: "fontFamily" }
  style-fragment:
    screenshot-aesthetic:
      $value: "authentic SSH terminal product screenshot atmosphere, dark TUI workspace, left tasks sidebar, center agent engine pane, right changes and shell panes, tmux-like borders, keyboard shortcut footer, terminal-native workflow density"
      $type: "text"
    reference-palette:
      $value: "marketing hero guided by the main visual reference: warm cream editorial canvas, dark ink product blocks, mint routing traces, amber active highlights, coral status accents, crisp black outlines, restrained grid structure, flat graphic clarity around the real terminal interface"
      $type: "text"
    launch-polish:
      $value: "turn the raw kobe screenshot into a polished product launch visual while preserving real terminal legibility, KOBE brand presence, parallel agent orchestration, isolated worktree lanes, and a confident developer-tool mood"
      $type: "text"
  negative:
    global-exclude:
      $value: "browser chrome, glossy SaaS cards, cartoon mascot, stock photo, people, celebrity athlete, basketball imagery, fake unreadable paragraphs, random icons, excessive neon, cluttered sci-fi dashboard, malformed main headline, watermark"
      $type: "text"
  reference:
    tui-screenshot: { $value: "workspace/products/codefox/kobe/references/kobe-tui-screenshot.png", $type: "asset" }
    main-visual: { $value: "workspace/products/codefox/kobe/references/main_visual.png", $type: "asset" }

alias:
  style:
    launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.screenshot-aesthetic}, {global.style-fragment.reference-palette}, {global.style-fragment.launch-polish}"
        palette: ["{global.color.ink-black}", "{global.color.panel-navy}", "{global.color.warm-cream}", "{global.color.soft-cream}", "{global.color.mint-green}", "{global.color.amber}", "{global.color.coral}", "{global.color.muted-slate}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-screenshot}", "{global.reference.main-visual}"]
    social-default:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.screenshot-aesthetic}, {global.style-fragment.reference-palette}"
        palette: ["{global.color.ink-black}", "{global.color.warm-cream}", "{global.color.mint-green}", "{global.color.amber}", "{global.color.coral}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-screenshot}", "{global.reference.main-visual}"]
