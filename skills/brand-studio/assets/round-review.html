<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>kobe logo — round review</title>
<style>
  :root{--ink:#191713;--paper:#F7F1E8;--clay:#D87857;--copper:#A85E34;--graphite:#3A342D;
        --keep:#3f9d5a;--maybe:#d9a441;--drop:#c0503f}
  *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"SF Mono",ui-monospace,Menlo,monospace}
  a{color:var(--copper)}
  header{padding:34px 44px 6px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);margin:0 0 8px}
  h1{font-family:"Helvetica Neue",Arial,sans-serif;font-weight:800;font-size:30px;letter-spacing:-.02em;margin:0}
  .goal{margin:8px 0 0;color:var(--graphite);font-size:13px;max-width:86ch;line-height:1.5}
  .nav{margin:10px 0 0;font-size:12px;color:var(--graphite)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:18px 44px 120px}
  .card{background:#fff;border:2px solid #e7ddcd;border-radius:12px;overflow:hidden;transition:border-color .12s}
  .card[data-v="keep"]{border-color:var(--keep)} .card[data-v="maybe"]{border-color:var(--maybe)} .card[data-v="drop"]{border-color:var(--drop);opacity:.6}
  .frame{aspect-ratio:1/1;display:grid;place-items:center;background:#0e0c0a}
  .frame img{width:100%;height:100%;object-fit:contain}
  .meta{padding:10px 12px 12px}
  .name{font-weight:700;font-size:12px;margin:0 0 8px;display:flex;gap:7px;align-items:center}
  .tag{font-family:"Helvetica Neue",Arial,sans-serif;background:var(--ink);color:var(--paper);font-size:10px;border-radius:4px;padding:1px 6px}
  .btns{display:flex;gap:6px;margin-bottom:8px}
  .btns button{flex:1;font:inherit;font-size:11px;border:1px solid #ddd0bb;background:#faf6ee;border-radius:6px;padding:4px 0;cursor:pointer}
  .btns button.on[data-b="keep"]{background:var(--keep);color:#fff;border-color:var(--keep)}
  .btns button.on[data-b="maybe"]{background:var(--maybe);color:#fff;border-color:var(--maybe)}
  .btns button.on[data-b="drop"]{background:var(--drop);color:#fff;border-color:var(--drop)}
  textarea{width:100%;font:inherit;font-size:11px;border:1px solid #e7ddcd;border-radius:6px;padding:6px;resize:vertical;min-height:34px;color:var(--graphite);background:#fffdf9}
  .bar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:var(--paper);padding:12px 44px;
       display:flex;gap:18px;align-items:center;font-size:12px;flex-wrap:wrap}
  .counts b{font-family:"Helvetica Neue",Arial,sans-serif}
  .pill{border-radius:999px;padding:2px 9px;margin-left:6px}
  .pill.keep{background:var(--keep)} .pill.maybe{background:var(--maybe)} .pill.drop{background:var(--drop)}
  .next{flex:1;min-width:260px;display:flex;gap:8px;align-items:center}
  .next input{flex:1;font:inherit;font-size:12px;border:0;border-radius:6px;padding:7px 10px;background:#2a2620;color:var(--paper)}
  .bar button{font:inherit;font-size:12px;background:var(--clay);color:#fff;border:0;border-radius:7px;padding:8px 14px;cursor:pointer}
</style></head><body>
  <header>
    <p class="eyebrow" id="eyebrow">kobe · logo · round review</p>
    <h1 id="title">round</h1>
    <p class="goal" id="goal"></p>
    <p class="nav" id="nav"></p>
  </header>
  <div class="grid" id="grid"></div>
  <div class="bar">
    <div class="counts">verdicts:
      <span class="pill keep">keep <b id="ck">0</b></span>
      <span class="pill maybe">maybe <b id="cm">0</b></span>
      <span class="pill drop">drop <b id="cd">0</b></span>
    </div>
    <div class="next"><span>next round →</span><input id="next" placeholder="direction for the next iteration…"/></div>
    <button onclick="exp()">Export decisions (JSON)</button>
  </div>
<script>
const qs=new URLSearchParams(location.search); const DATA=qs.get('data')||'round.json';
let R={}; const KEY=f=>`kobe-review:${DATA}:${f}`;
function setV(id,v){const cur=localStorage.getItem(KEY('v:'+id)); const nv=cur===v?'':v; localStorage.setItem(KEY('v:'+id),nv); render();}
function counts(){let k=0,m=0,d=0; R.items.forEach(it=>{const v=localStorage.getItem(KEY('v:'+it.id))||it.verdict||''; if(v==='keep')k++;else if(v==='maybe')m++;else if(v==='drop')d++;}); ck.textContent=k;cm.textContent=m;cd.textContent=d;}
function render(){
  eyebrow.textContent=`kobe · logo · round ${R.round} · review`;
  title.textContent=`round ${R.round} — ${R.title||''}`;
  goal.textContent=R.goal||'';
  nav.innerHTML=(R.prev||[]).map(p=>`<a href="round-review.html?data=${p.data}">◂ round ${p.round} ${p.title||''}</a>`).join(' &nbsp; ');
  grid.innerHTML=R.items.map(it=>{const v=localStorage.getItem(KEY('v:'+it.id))||it.verdict||''; const note=localStorage.getItem(KEY('n:'+it.id))??(it.note||'');
    return `<div class="card" data-v="${v}"><div class="frame"><img src="${it.img}?t=${Date.now()}"/></div>
     <div class="meta"><p class="name"><span class="tag">${it.id}</span> ${it.concept||''}</p>
      <div class="btns">
        <button data-b="keep" class="${v==='keep'?'on':''}" onclick="setV('${it.id}','keep')">keep</button>
        <button data-b="maybe" class="${v==='maybe'?'on':''}" onclick="setV('${it.id}','maybe')">maybe</button>
        <button data-b="drop" class="${v==='drop'?'on':''}" onclick="setV('${it.id}','drop')">drop</button>
      </div>
      <textarea placeholder="note / feedback…" oninput="localStorage.setItem(KEY('n:${it.id}'),this.value)">${note}</textarea>
     </div></div>`;}).join('');
  const n=localStorage.getItem(KEY('next')); if(n!=null)document.getElementById('next').value=n;
  counts();
}
document.getElementById('next')?.addEventListener('input',e=>localStorage.setItem(KEY('next'),e.target.value));
function exp(){const out={round:R.round,title:R.title,data:DATA,decisions:R.items.map(it=>({id:it.id,concept:it.concept,
    verdict:localStorage.getItem(KEY('v:'+it.id))||it.verdict||'',note:localStorage.getItem(KEY('n:'+it.id))||it.note||''})),
    next:localStorage.getItem(KEY('next'))||''};
  const s=JSON.stringify(out,null,2); navigator.clipboard?.writeText(s);
  const b=new Blob([s],{type:'application/json'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download=`decisions-${DATA}`; a.click();
  alert('Copied to clipboard + downloaded decisions-'+DATA);}
fetch(DATA).then(r=>r.json()).then(j=>{R=j;render();}).catch(e=>{document.body.innerHTML='<p style="padding:44px">Could not load '+DATA+': '+e+'</p>';});
</script></body></html>
