version: "1.1.0"

portfolio:
  id: "codefox"
  name: "CodeFox"
  version: "1.0.0"

brand:
  id: "kobe"
  name: "kobe"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "fixed"
    seed: 24018
    quality: "medium"
    timeout_seconds: 180
    retry_attempts: 3
    output_format: "png"

global:
  color:
    terminal-black: { $value: "#10110F", $type: "color" }
    pane-black: { $value: "#14191F", $type: "color" }
    kobe-orange: { $value: "#E87855", $type: "color" }
    agent-green: { $value: "#87D982", $type: "color" }
    dim-gray: { $value: "#8C8C86", $type: "color" }
  typography:
    terminal-face: { $value: "monospaced terminal UI typography, readable large headline, precise pane labels, no fake paragraph blocks", $type: "fontFamily" }
  style-fragment:
    screenshot-aesthetic:
      $value: "authentic SSH terminal product screenshot atmosphere, dark TUI workspace, three-pane layout, left tasks sidebar, center Claude Code engine pane, right changes and shell panes, tmux-like borders, orange active selection, muted gray labels, green diff counters"
      $type: "text"
    launch-polish:
      $value: "turn the raw screenshot into a polished promotional hero while preserving real terminal density, black background, orange KOBE brand accent, pane dividers, keyboard shortcut footer, and agent orchestration workflow"
      $type: "text"
  negative:
    global-exclude:
      $value: "browser chrome, glossy SaaS cards, cartoon mascot, fake unreadable paragraphs, random icons, stock photo, excessive neon, cluttered sci-fi dashboard, malformed main headline, watermark"
      $type: "text"
  reference:
    tui-screenshot: { $value: "workspace/products/codefox/kobe/references/kobe-tui-screenshot.png", $type: "asset" }

alias:
  style:
    launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.screenshot-aesthetic}, {global.style-fragment.launch-polish}"
        palette: ["{global.color.terminal-black}", "{global.color.pane-black}", "{global.color.kobe-orange}", "{global.color.agent-green}", "{global.color.dim-gray}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-screenshot}"]
    social-default:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.screenshot-aesthetic}"
        palette: ["{global.color.terminal-black}", "{global.color.kobe-orange}", "{global.color.agent-green}"]
        typography: "{global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.tui-screenshot}"]
