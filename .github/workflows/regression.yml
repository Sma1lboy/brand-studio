name: Regression

on:
  workflow_dispatch:
    inputs:
      live:
        description: "Call the image provider instead of writing dry-run placeholders."
        required: true
        type: boolean
        default: false
      brand_path:
        description: "Path to brand.lock.yaml."
        required: true
        type: string
        default: skills/marketing-harness/examples/codefox/workspace/products/codefox/codefox/brand.lock.yaml
      prompts_path:
        description: "Path to the fixed regression prompt suite."
        required: true
        type: string
        default: tests/regression/prompts.yaml

permissions:
  contents: read

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regression:
    name: Generate regression artifacts
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      HARNESS_SKILL_CLI_COMMAND: ${{ vars.HARNESS_SKILL_CLI_COMMAND }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run regression without API calls
        if: ${{ !inputs.live }}
        run: >
          uv run harness regression
          --brand "${{ inputs.brand_path }}"
          --prompts "${{ inputs.prompts_path }}"
          --dry-run

      - name: Run live regression
        if: ${{ inputs.live }}
        run: >
          uv run harness regression
          --brand "${{ inputs.brand_path }}"
          --prompts "${{ inputs.prompts_path }}"

      - name: Upload regression outputs
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ github.run_id }}
          path: outputs/regression/**
          if-no-files-found: error
          retention-days: 30
