version: 1.2.0
brand:
  id: codefox
  name: CodeFox
provider:
  gateway: gpt-image-skill
  model: gpt-image-2
  params:
    seed_strategy: fixed
    seed: 12345
    quality: medium
    timeout_seconds: 120
    retry_attempts: 3
    output_format: png
global:
  color:
    brand-primary:
      $value: '#101820'
      $type: color
    brand-accent:
      $value: '#2FE6A7'
      $type: color
    bg-neutral:
      $value: '#F7F1E5'
      $type: color
  typography:
    primary-face:
      $value: clean geometric sans serif, high legibility
      $type: fontFamily
  style-fragment:
    base-aesthetic:
      $value: '# CodeFox Marketing Harness Brand Brief Subject: CodeFox Marketing
        Harness, a developer-facing system that turns locked brand tokens into versioned
        campaign image artifacts. Audience: product engineers, growth teams, and founders
        who need repeatable launch visuals without letting, consistent brand system,
        production-ready marketing visual language, disciplined composition'
      $type: text
    mood-clean:
      $value: clean, controlled, legible, spacious, precise, no visual clutter
      $type: text
  negative:
    global-exclude:
      $value: low quality, blurry, distorted text, malformed logo, watermark, crowded
        layout, off-brand colors
      $type: text
  reference:
    main-visual:
      $value: workspace/products/codefox/codefox/references/main_visual.png
      $type: asset
alias:
  style:
    launch-hero:
      $type: composite
      $value:
        prompt: '{global.style-fragment.base-aesthetic}, {global.style-fragment.mood-clean}'
        palette:
        - '{global.color.brand-primary}'
        - '{global.color.brand-accent}'
        typography: '{global.typography.primary-face}'
        negative: '{global.negative.global-exclude}'
        references:
        - '{global.reference.main-visual}'
    social-default:
      $type: composite
      $value:
        prompt: '{global.style-fragment.base-aesthetic}'
        palette:
        - '{global.color.brand-primary}'
        - '{global.color.bg-neutral}'
        typography: '{global.typography.primary-face}'
        negative: '{global.negative.global-exclude}'
        references:
        - '{global.reference.main-visual}'
